<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>A.C.E.3 THE FINAL 한국어 패치</title>
  <meta name="description" content="PS2 Another Century's Episode 3: The Final (A.C.E.3) 한국어 번역 패치 문서" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --blue: #1d5fd6;
      --blue-deep: #123f92;
      --steel: #4f6b8f;
      --cyan: #37b6d9;
      --theme-color: #1d5fd6;
    }
    * { -webkit-font-smoothing: antialiased; }
    body { font-family: 'Noto Sans KR', -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif; }

    /* ---- 본문 ---- */
    .markdown-section { max-width: 860px; }
    .markdown-section h1 { font-weight: 900; letter-spacing: -0.01em; }
    .markdown-section h2 {
      font-weight: 700; border-bottom: 2px solid #e8eef7;
      padding-bottom: .3em; margin-top: 2.4rem; letter-spacing: -0.01em;
    }
    .markdown-section h2::before {
      content: ""; display: inline-block; width: .5em; height: .5em;
      margin-right: .5em; background: var(--blue);
      transform: rotate(45deg); vertical-align: middle;
    }
    .markdown-section a { color: var(--blue); font-weight: 500; }
    .markdown-section a:hover { color: var(--blue-deep); text-decoration: underline; }
    .markdown-section tr:nth-child(2n) { background: #f4f8fd; }
    .markdown-section th { background: var(--blue); color: #fff; font-weight: 700; }
    .markdown-section table { border-collapse: collapse; }
    .markdown-section td, .markdown-section th { border: 1px solid #d5e2f3; }
    .markdown-section blockquote {
      border-left: 4px solid var(--cyan); background: #eef7fb;
      color: #33566b; border-radius: 0 6px 6px 0;
    }
    .markdown-section code { color: var(--blue-deep); background: #e9f0fa; }
    .markdown-section pre { background: #16233a; }
    .markdown-section pre > code { color: #dbe7f7; background: transparent; }

    /* ---- 사이드바 ---- */
    .sidebar { border-right: 1px solid #dde7f3; background: #fbfdff; }
    .sidebar .app-name-link { color: var(--blue) !important; font-weight: 900; }
    .sidebar ul li a { color: #3d4e63; }
    .sidebar ul li.active > a {
      color: var(--blue); font-weight: 700; border-right: 3px solid var(--blue);
    }

    .badges img { margin: 2px 4px 2px 0; }
  </style>
</head>
<body>
  <div id="app">불러오는 중…</div>
  <script>
    window.$docsify = {
      name: '🤖 A.C.E.3 THE FINAL<br><small style="font-weight:400;opacity:.7">한국어 패치</small>',
      repo: 'https://github.com/kimjh-eclipse/ace3-korean',
      homepage: 'home.md',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 3,
      relativePath: true,
      notFoundPage: true,
      search: {
        placeholder: '문서 검색…',
        noData: '검색 결과가 없습니다.',
        depth: 4
      },
      pagination: {
        previousText: '이전',
        nextText: '다음',
        crossChapter: true
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
